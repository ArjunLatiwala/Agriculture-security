name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Build Docker image
      run: docker build -t crop-yield-api:${{ github.sha }} .

    - name: Run security scan
      run: |
        docker run --rm -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy image crop-yield-api:${{ github.sha }} || true

    - name: Deploy to Kubernetes
      run: |
        kubectl apply -f deployment.yaml
        kubectl set image deployment/crop-yield-api -n production api=crop-yield-api:${{ github.sha }}
        kubectl rollout status deployment/crop-yield-api -n production
