name: Build, Test, and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write
  actions: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: arjunlatiwala/agriculture-security

jobs:
  security-scan:
    runs-on: ubuntu-latest
    name: Security Scanning
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Trivy
      run: |
        sudo apt-get update
        sudo apt-get install -y wget apt-transport-https gnupg lsb-release
        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
        echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
        sudo apt-get update
        sudo apt-get install -y trivy

    - name: Run Trivy filesystem scanner
      run: trivy fs --severity HIGH,CRITICAL --format table --output trivy-fs-report.txt --exit-code 0 .

    - name: Upload filesystem scan report
      uses: actions/upload-artifact@v4
      with:
        name: trivy-filesystem-report
        path: trivy-fs-report.txt

  unit-tests:
    runs-on: ubuntu-latest
    name: Unit Tests
    needs: security-scan
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: pip

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest==8.3.4 httpx==0.24.1

    - name: Run tests
      run: pytest test_app.py -v

  code-quality:
    runs-on: ubuntu-latest
    name: Code Quality Analysis
    needs: security-scan
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: pip

    - name: Install quality tools
      run: pip install pylint flake8 bandit

    - name: Run Pylint
      run: pylint app.py --exit-zero

    - name: Run Flake8
      run: flake8 app.py --exit-zero

    - name: Run Bandit security linter
      run: bandit -r app.py -f json -o bandit-report.json || true

    - name: Upload Bandit report
      uses: actions/upload-artifact@v4
      with:
        name: bandit-report
        path: bandit-report.json

  build-image:
    runs-on: ubuntu-latest
    name: Build and Push Image
    needs: [unit-tests, code-quality]
    outputs:
      image: ${{ steps.image.outputs.image }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract Docker metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=raw,value=latest,enable={{is_default_branch}}
          type=sha,prefix=sha-

    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Set image output
      id: image
      run: echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

  image-scan:
    runs-on: ubuntu-latest
    name: Container Image Scanning
    needs: build-image
    steps:
    - name: Install Trivy
      run: |
        sudo apt-get update
        sudo apt-get install -y wget apt-transport-https gnupg lsb-release
        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
        echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
        sudo apt-get update
        sudo apt-get install -y trivy

    - name: Run Trivy image scan
      run: trivy image --severity HIGH,CRITICAL --format table --output trivy-image-report.txt --exit-code 0 ${{ needs.build-image.outputs.image }}

    - name: Upload image scan report
      uses: actions/upload-artifact@v4
      with:
        name: trivy-image-report
        path: trivy-image-report.txt

  sbom:
    runs-on: ubuntu-latest
    name: Generate SBOM
    needs: build-image
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Generate SBOM
      uses: anchore/sbom-action@v0
      with:
        path: .
        format: cyclonedx-json
        output-file: sbom.json

    - name: Upload SBOM
      uses: actions/upload-artifact@v4
      with:
        name: sbom
        path: sbom.json

  deployment-validation:
    runs-on: ubuntu-latest
    name: Deployment Validation
    needs: [build-image, image-scan]
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Validate Kubernetes manifest syntax
      run: |
        docker run --rm -v "${PWD}:/work" ghcr.io/yannh/kubeconform:latest \
          -strict -summary /work/deployment.yaml

    - name: Render deployment image
      run: |
        sed "s|image: crop-yield-api:latest|image: ${{ needs.build-image.outputs.image }}|" deployment.yaml > rendered-deployment.yaml
        grep "image:" rendered-deployment.yaml

    - name: Upload rendered deployment
      uses: actions/upload-artifact@v4
      with:
        name: rendered-deployment
        path: rendered-deployment.yaml

  deployment-dry-run:
    runs-on: ubuntu-latest
    name: Deployment Dry Run
    needs: deployment-validation
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Create local Kubernetes cluster
      uses: helm/kind-action@v1
      with:
        cluster_name: ci-validation

    - name: Apply manifests to CI cluster
      run: kubectl apply -f deployment.yaml

    - name: Verify Kubernetes objects
      run: |
        kubectl get namespace production
        kubectl get deployment crop-yield-api -n production
        kubectl get service crop-yield-api -n production
        kubectl get role crop-yield-api-role -n production
        kubectl get networkpolicy crop-yield-api-netpol -n production

  summary:
    runs-on: ubuntu-latest
    name: Pipeline Summary
    needs: [security-scan, unit-tests, code-quality, build-image, image-scan, sbom, deployment-validation, deployment-dry-run]
    if: always()
    steps:
    - name: Pipeline status
      run: |
        echo "Security Scanning: ${{ needs.security-scan.result }}"
        echo "Unit Tests: ${{ needs.unit-tests.result }}"
        echo "Code Quality: ${{ needs.code-quality.result }}"
        echo "Build Image: ${{ needs.build-image.result }}"
        echo "Image Scanning: ${{ needs.image-scan.result }}"
        echo "SBOM: ${{ needs.sbom.result }}"
        echo "Deployment Validation: ${{ needs.deployment-validation.result }}"
        echo "Deployment Dry Run: ${{ needs.deployment-dry-run.result }}"
