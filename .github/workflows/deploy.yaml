name: Build, Test, and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write
  actions: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: arjunlatiwala/agriculture-security

jobs:
  security-scan:
    runs-on: ubuntu-latest
    name: Security Scanning
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Trivy
      run: |
        sudo apt-get update
        sudo apt-get install -y wget apt-transport-https gnupg lsb-release
        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
        echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
        sudo apt-get update
        sudo apt-get install -y trivy

    - name: Run Trivy filesystem scanner
      run: trivy fs --severity HIGH,CRITICAL --format table --output trivy-fs-report.txt --exit-code 0 .

    - name: Upload filesystem scan report
      uses: actions/upload-artifact@v4
      with:
        name: trivy-filesystem-report
        path: trivy-fs-report.txt

  unit-tests:
    runs-on: ubuntu-latest
    name: Unit Tests
    needs: security-scan
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: pip

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest==8.3.4 httpx==0.24.1

    - name: Run tests
      run: pytest test_app.py -v

  code-quality:
    runs-on: ubuntu-latest
    name: Code Quality Analysis
    needs: security-scan
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: pip

    - name: Install quality tools
      run: pip install pylint flake8 bandit

    - name: Run Pylint
      run: pylint app.py --exit-zero

    - name: Run Flake8
      run: flake8 app.py --exit-zero

    - name: Run Bandit security linter
      run: bandit -r app.py -f json -o bandit-report.json || true

    - name: Upload Bandit report
      uses: actions/upload-artifact@v4
      with:
        name: bandit-report
        path: bandit-report.json

  build-image:
    runs-on: ubuntu-latest
    name: Build and Push Image
    needs: [unit-tests, code-quality]
    outputs:
      image: ${{ steps.image.outputs.image }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract Docker metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=raw,value=latest,enable={{is_default_branch}}
          type=sha,prefix=sha-

    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Set image output
      id: image
      run: echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

  image-scan:
    runs-on: ubuntu-latest
    name: Container Image Scanning
    needs: build-image
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build local image for scanning
      run: docker build -t crop-yield-api:ci-scan .

    - name: Install Trivy
      run: |
        sudo apt-get update
        sudo apt-get install -y wget apt-transport-https gnupg lsb-release
        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
        echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
        sudo apt-get update
        sudo apt-get install -y trivy

    - name: Run Trivy image scan
      run: trivy image --severity HIGH,CRITICAL --format table --output trivy-image-report.txt --exit-code 0 --scanners vuln crop-yield-api:ci-scan

    - name: Upload image scan report
      uses: actions/upload-artifact@v4
      with:
        name: trivy-image-report
        path: trivy-image-report.txt

  sbom:
    runs-on: ubuntu-latest
    name: Generate SBOM
    needs: build-image
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Generate SBOM
      uses: anchore/sbom-action@v0
      with:
        path: .
        format: cyclonedx-json
        output-file: sbom.json

    - name: Upload SBOM
      uses: actions/upload-artifact@v4
      with:
        name: sbom
        path: sbom.json

  deployment-validation:
    runs-on: ubuntu-latest
    name: Deployment Validation
    needs: [build-image, image-scan]
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Validate Kubernetes manifest syntax
      run: |
        docker run --rm -v "${PWD}:/work" ghcr.io/yannh/kubeconform:latest \
          -strict -summary /work/deployment.yaml

    - name: Render deployment image
      run: |
        sed "s|image: crop-yield-api:latest|image: ${{ needs.build-image.outputs.image }}|" deployment.yaml > rendered-deployment.yaml
        grep "image:" rendered-deployment.yaml

    - name: Upload rendered deployment
      uses: actions/upload-artifact@v4
      with:
        name: rendered-deployment
        path: rendered-deployment.yaml

  deployment-dry-run:
    runs-on: ubuntu-latest
    name: Deployment Dry Run
    needs: deployment-validation
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Create local Kubernetes cluster
      uses: helm/kind-action@v1
      with:
        cluster_name: ci-validation

    - name: Apply manifests to CI cluster
      run: kubectl apply -f deployment.yaml

    - name: Verify Kubernetes objects
      run: |
        kubectl get namespace production
        kubectl get deployment crop-yield-api -n production
        kubectl get service crop-yield-api -n production
        kubectl get role crop-yield-api-role -n production
        kubectl get networkpolicy crop-yield-api-netpol -n production

  summary:
    runs-on: ubuntu-latest
    name: Pipeline Summary
    needs: [security-scan, unit-tests, code-quality, build-image, image-scan, sbom, deployment-validation, deployment-dry-run]
    if: always()
    permissions:
      actions: read
      contents: read
    steps:
    - name: Create pipeline summary
      uses: actions/github-script@v7
      env:
        SECURITY_SCAN_STATUS: ${{ needs.security-scan.result }}
        UNIT_TESTS_STATUS: ${{ needs.unit-tests.result }}
        CODE_QUALITY_STATUS: ${{ needs.code-quality.result }}
        BUILD_IMAGE_STATUS: ${{ needs.build-image.result }}
        IMAGE_SCAN_STATUS: ${{ needs.image-scan.result }}
        SBOM_STATUS: ${{ needs.sbom.result }}
        DEPLOYMENT_VALIDATION_STATUS: ${{ needs.deployment-validation.result }}
        DEPLOYMENT_DRY_RUN_STATUS: ${{ needs.deployment-dry-run.result }}
      with:
        script: |
          const workflowJobs = await github.paginate(github.rest.actions.listJobsForWorkflowRun, {
            owner: context.repo.owner,
            repo: context.repo.repo,
            run_id: context.runId,
            per_page: 100
          });

          const statusByName = {
            'Security Scanning': process.env.SECURITY_SCAN_STATUS,
            'Unit Tests': process.env.UNIT_TESTS_STATUS,
            'Code Quality Analysis': process.env.CODE_QUALITY_STATUS,
            'Build and Push Image': process.env.BUILD_IMAGE_STATUS,
            'Container Image Scanning': process.env.IMAGE_SCAN_STATUS,
            'Generate SBOM': process.env.SBOM_STATUS,
            'Deployment Validation': process.env.DEPLOYMENT_VALIDATION_STATUS,
            'Deployment Dry Run': process.env.DEPLOYMENT_DRY_RUN_STATUS
          };

          const order = Object.keys(statusByName);
          const icon = (status) => status === 'success' ? '✅' : status === 'failure' ? '❌' : status === 'cancelled' ? '⚠️' : '⏳';
          const duration = (job) => {
            if (!job.started_at || !job.completed_at) return '-';
            const ms = new Date(job.completed_at) - new Date(job.started_at);
            const seconds = Math.round(ms / 1000);
            const minutes = Math.floor(seconds / 60);
            const remainder = seconds % 60;
            return minutes > 0 ? `${minutes}m ${remainder}s` : `${seconds}s`;
          };

          const rows = order.map(name => {
            const job = workflowJobs.find(item => item.name === name);
            const status = statusByName[name];
            return `| ${name} | ${icon(status)} ${status} | ${job ? duration(job) : '-'} |`;
          }).join('\n');

          const run = await github.rest.actions.getWorkflowRun({
            owner: context.repo.owner,
            repo: context.repo.repo,
            run_id: context.runId
          });
          const totalMs = new Date(run.data.updated_at) - new Date(run.data.created_at);
          const totalSeconds = Math.round(totalMs / 1000);
          const totalDuration = `${Math.floor(totalSeconds / 60)}m ${totalSeconds % 60}s`;

          await core.summary
            .addHeading('DevSecOps Pipeline Summary')
            .addRaw(`**Overall status:** ${icon(run.data.conclusion)} ${run.data.conclusion || 'in_progress'}  \\n`)
            .addRaw(`**Total workflow duration:** ${totalDuration}  \\n`)
            .addRaw(`**Container image:** \`${process.env.REGISTRY || 'ghcr.io'}/${process.env.IMAGE_NAME || context.repo.repo.toLowerCase()}:sha-${context.sha}\`\n\n`)
            .addTable([
              [{data: 'Job', header: true}, {data: 'Status', header: true}, {data: 'Duration', header: true}],
              ...order.map(name => {
                const job = workflowJobs.find(item => item.name === name);
                const status = statusByName[name];
                return [name, `${icon(status)} ${status}`, job ? duration(job) : '-'];
              })
            ])
            .addHeading('Controls validated', 2)
            .addList([
              'Filesystem vulnerability scan',
              'Unit tests and API validation',
              'Static code quality checks',
              'Docker image build and push',
              'Container image vulnerability scan',
              'Software Bill of Materials generation',
              'Kubernetes manifest validation',
              'Kubernetes deployment dry run on a temporary kind cluster'
            ])
            .write();

          console.log('Pipeline summary generated');
